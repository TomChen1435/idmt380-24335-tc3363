<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reader</title>
    <link rel="icon" href="/media/images/favicon/polychromatic.ico">
    <link rel="stylesheet" href="/media/reset.css">
    <link rel="stylesheet" href="/media/colors/ibm_design_language.css">
    <link rel="stylesheet" href="/media/basics.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header>
        <a href="#" aria-label="project" class="project">
            <img src="./images/logo.svg" alt="The Project Gutenberg logo, featuring the name 'Project Gutenberg' in a serif font, framed by two stylized, red-and-blue open book outlines that create a circular border." class="icon">
            <p class="wrap">Project<br>Gutenberg</p>
            <p class="nowrap">Project Gutenberg</p>
        </a>
    </header>

    <section aria-label="metadata" class="metadata">
        <h1 aria-label="title" class="title"></h1>
        <h2 aria-label="author" class="author"></h2>
        <h3 aria-label="version" class="version"></h3>
    </section>

    <picture aria-label="cover" class="cover">
        <source>
        <img>
    </picture>

    <aside aria-label="menu">
        <ul id="menu">
            <h2>Menu</h2>
        </ul>
    </aside>

    <hr>

    <main aria-label="content"></main>

    <script src="./functions.js"></script>

    <script>
        // Fetch data from JSON

        fetch('./data.json')

        .then(response => {
            if (!response.ok) {
                throw new Error('An error happened when fetching data from JSON.');
            }
            return response.json();
        })

        .then(data => {
            addImage(data.image);
            addTitle(data.title);
            addAuthor(data.author);
            addVersion(data.version);
            addContent(data.content);
        })

        .catch(error => {
            console.error("Here is the report: " + error);
        });
    </script>
</body>
</html>
